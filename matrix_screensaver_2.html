
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Matrix 2</title>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    width: 100%;
    height: 100%;
}
canvas {
    display:block;
    width:100vw;
    height:100vh;
}
.info {
    position:absolute;
    bottom:10px;
    right:20px;
    color:#00ff88;
    font-family: monospace;
    font-size:12px;
    opacity:0.5;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="info">Cyber Matrix 2</div>
<script>
const chars = `《分布式黎明 / Distributed Dawn》

Kafka streams 在城市边缘轰鸣，
Raft leader 于暗网维持秩序，
Lamport clock 缓慢校准月光，
Vector timestamp 切开迷雾。

TLS 握手像秘密外交，
AES-GCM 覆盖旧时代回声，
Side-channel whispers 漏出余温，
Kernel panic 则沉默凝视。

IPFS fragments 飘散至轨道，
Quorum votes 穿过玻璃雨层，
Homomorphic encryption 重构记忆，
RPC echoes 回响废弃卫星。

最后一台 validator 仍未离线，
Rust threads 缠绕绿色字符雨，
Quantum-resistant keys 守住边界，
Consensus 在黑夜重新启动。`;
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = 1920;
    canvas.height = 1080;
}
resize();

const fontSize = 20;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1).map(() => Math.random()*-100);
const speeds = Array(columns).fill(0).map(() => 0.5 + Math.random()*2.5);

function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = fontSize + 'px monospace';

    for(let i=0;i<drops.length;i++) {
        const text = chars[Math.floor(Math.random()*chars.length)];
        const green = Math.floor(120 + Math.random()*135);
        ctx.fillStyle = `rgb(0,${green},0)`;
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = Math.random()*-50;
        }
        drops[i] += speeds[i]*0.08;
    }
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
