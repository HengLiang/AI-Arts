  <!-- 装饰代码 -->
  <g opacity="0.25" font-family="monospace" font-size="12" fill="#00cc00">
    <text x="100" y="80">SHA256(data) → hash</text>
    <text x="1580" y="100">AES.encrypt(key, plaintext)</text>
    <text x="120" y="1060">HMAC(K, M) = H((K ⊕ opad) || H((K ⊕ ipad) || M))</text>
    <text x="1400" y="1060">merkle_root = hash(left_child + right_child)</text>
